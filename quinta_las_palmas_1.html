<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quinta Las Palmas 🌴</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #e5ddd5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.chat-wrap {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.chat-header {
  background: #1a6e45;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.chat-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #2d9e67;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.chat-header-info h2 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
.chat-header-info p  { color: #a8e6c5; font-size: 12px; margin: 2px 0 0; }
.chat-body {
  flex: 1;
  padding: 16px 12px 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-line;
}
.msg.bot  { background:#fff; color:#222; border-bottom-left-radius:4px; align-self:flex-start; box-shadow:0 1px 2px rgba(0,0,0,.1); }
.msg.user { background:#d9fdd3; color:#111; border-bottom-right-radius:4px; align-self:flex-end; box-shadow:0 1px 2px rgba(0,0,0,.1); }
.btn-grid { display:flex; flex-direction:column; gap:8px; }
.menu-btn {
  background:#fff; border:1.5px solid #1a6e45; color:#1a6e45;
  border-radius:22px; padding:11px 18px;
  font-size:14px; font-weight:500;
  cursor:pointer; text-align:left;
  display:flex; align-items:center; gap:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
  transition: background .15s, color .15s;
}
.menu-btn:active { background:#1a6e45; color:#fff; }
.back-btn {
  background:#fff; border:1px solid #ccc; color:#555;
  border-radius:22px; padding:9px 18px;
  font-size:13px; cursor:pointer; align-self:flex-start;
  margin-top:2px;
}
.back-btn:active { background:#f0f0f0; }
.avail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.month-btn {
  background:#fff; border:1.5px solid #1a6e45; color:#1a6e45;
  border-radius:14px; padding:13px 8px;
  font-size:14px; font-weight:600;
  cursor:pointer; text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
  transition: background .15s, color .15s;
}
.month-btn:active { background:#1a6e45; color:#fff; }
.calendar-wrap {
  background:#fff; border-radius:14px;
  padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.cal-header { text-align:center; font-weight:700; font-size:15px; color:#1a6e45; margin-bottom:10px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
.cal-day-name { font-size:10px; color:#888; padding:3px 0; font-weight:600; }
.cal-day { padding:6px 2px; border-radius:8px; font-size:12px; font-weight:500; }
.cal-day.available { background:#e8f5ee; color:#1a6e45; }
.cal-day.occupied  { background:#fee2e2; color:#991b1b; }
.cal-day.past      { color:#ccc; }
.cal-day.empty     { background:transparent; }
.legend { display:flex; gap:14px; margin-top:10px; font-size:12px; justify-content:center; }
.legend span { display:flex; align-items:center; gap:5px; }
.dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.dot.a { background:#1a6e45; } .dot.o { background:#ef4444; }
.info-card {
  background:#fff; border-radius:14px;
  padding:14px 16px; font-size:14px; line-height:2;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.info-row { display:flex; gap:10px; align-items:flex-start; }
.wa-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:#25d366; color:#fff;
  border:none; border-radius:22px;
  padding:13px 20px; font-size:14px; font-weight:600;
  cursor:pointer; text-decoration:none;
  width:100%; box-shadow:0 2px 6px rgba(37,211,102,.3);
  margin-top:8px;
}
.maps-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:#4285f4; color:#fff;
  border:none; border-radius:22px;
  padding:13px 20px; font-size:14px; font-weight:600;
  cursor:pointer; text-decoration:none;
  width:100%; box-shadow:0 2px 6px rgba(66,133,244,.3);
  margin-top:8px;
}
.photo-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
.photo-item { border-radius:12px; overflow:hidden; aspect-ratio:4/3; background:#ddd; cursor:pointer; }
.photo-item img { width:100%; height:100%; object-fit:cover; display:block; }
.lightbox {
  display:none; position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.92);
  z-index:1000;
  align-items:center; justify-content:center;
  padding:20px;
}
.lightbox.active { display:flex; }
.lightbox img { max-width:100%; max-height:90vh; border-radius:10px; object-fit:contain; }
.lb-close {
  position:fixed; top:14px; right:14px;
  background:rgba(255,255,255,.2); color:#fff;
  border:none; border-radius:50%;
  width:38px; height:38px; font-size:20px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.typing { display:flex; gap:5px; align-items:center; padding:4px 0; }
.typing span { width:8px; height:8px; background:#bbb; border-radius:50%; animation:bonce 1s infinite; }
.typing span:nth-child(2){ animation-delay:.15s; }
.typing span:nth-child(3){ animation-delay:.3s; }
@keyframes bonce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-avatar">🌴</div>
    <div class="chat-header-info">
      <h2>Quinta Las Palmas</h2>
      <p>⚡ Responde al instante</p>
    </div>
  </div>
  <div class="chat-body" id="chatBody"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="Foto Quinta Las Palmas">
</div>

<script>
const API_KEY     = 'AIzaSyCGwrCSi4QauG6zHuP22GxY_LmtawZgNCE';
const CALENDAR_ID = 'family14855803783818086352@group.calendar.google.com';
const MAPS_LINK   = 'https://maps.app.goo.gl/v8WPUGktyCqbCE557';
const WA_NUMBER   = '528712519825';

const PHOTOS = [
  'foto1.jpg','foto2.jpg','foto3.jpg','foto4.jpg',
  'foto5.jpg','foto6.jpg','foto7.jpg','foto8.jpg',
  'foto9.jpg','foto10.jpg','foto11.jpg','foto12.jpg',
];

const MONTHS = [
  { name:'Mayo',   year:2026, num:5 },
  { name:'Junio',  year:2026, num:6 },
  { name:'Julio',  year:2026, num:7 },
  { name:'Agosto', year:2026, num:8 },
];

const body = document.getElementById('chatBody');
const scroll = () => setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 60);
let menuEndMarker = null;

function clearSection() {
  if (menuEndMarker) {
    while (menuEndMarker.nextSibling) body.removeChild(menuEndMarker.nextSibling);
  }
}

function addMsg(text, type='bot', html=false) {
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  html ? d.innerHTML = text : d.textContent = text;
  body.appendChild(d); scroll(); return d;
}
function addNode(el) { body.appendChild(el); scroll(); return el; }
function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  body.appendChild(d); scroll(); return d;
}
function resetChat() { body.innerHTML = ''; menuEndMarker = null; showMenu(); }

function backBtn() {
  const b = document.createElement('button');
  b.className = 'back-btn'; b.textContent = '← Volver al menú';
  b.onclick = resetChat; addNode(b);
}
function waLink(label, msg) {
  const a = document.createElement('a');
  a.className = 'wa-btn';
  a.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  a.target = '_blank'; a.innerHTML = '💬 ' + label; return a;
}

function showMenu() {
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    addMsg('¡Hola! 👋 Bienvenido/a a *Quinta Las Palmas* 🌴\n\n¿En qué te podemos ayudar?', 'bot');
    const grid = document.createElement('div');
    grid.className = 'btn-grid';
    [
      { icon:'ℹ️', label:'Información general', fn: showInfo },
      { icon:'📅', label:'Ver disponibilidad',  fn: showMonths },
      { icon:'📍', label:'Ubicación',           fn: showUbicacion },
      { icon:'✅', label:'¿Qué incluye?',       fn: showIncluye },
      { icon:'📸', label:'Fotos de la quinta',  fn: showFotos },
    ].forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'menu-btn';
      btn.innerHTML = `<span>${o.icon}</span>${o.label}`;
      btn.onclick = () => {
        clearSection();
        addMsg(o.label, 'user');
        o.fn();
      };
      grid.appendChild(btn);
    });
    addNode(grid);
    const marker = document.createElement('div');
    marker.style.display = 'none';
    body.appendChild(marker);
    menuEndMarker = marker;
    scroll();
  }, 800);
}

function showInfo() {
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    const card = document.createElement('div');
    card.className = 'info-card';
    card.innerHTML = `
      <div class="info-row">🌴 <span><strong>Quinta Las Palmas</strong></span></div>
      <div class="info-row">👥 <span>Hasta <strong>50 personas</strong></span></div>
      <div class="info-row">⏰ <span>Duración: <strong>6 horas</strong></span></div>
      <div class="info-row">🔥 <span>Asador y disco incluidos</span></div>
      <div class="info-row">📶 <span>WiFi incluido</span></div>
      <div class="info-row">🏊 <span>Alberca y jacuzzi</span></div>
      <div class="info-row">💰 <span>Renta: <strong>$2,100</strong> · Reserva con <strong>$500</strong></span></div>
      <div class="info-row">📞 <span>871 251 9825</span></div>
    `;
    addNode(card);
    addNode(waLink('Quiero reservar', 'Hola, me interesa rentar la Quinta Las Palmas 🌴'));
    backBtn();
  }, 700);
}

function showMonths() {
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    addMsg('¿Para qué mes quieres checar disponibilidad?', 'bot');
    const grid = document.createElement('div');
    grid.className = 'avail-grid';
    MONTHS.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'month-btn'; btn.textContent = m.name;
      btn.onclick = () => { addMsg(m.name, 'user'); loadCalendar(m); };
      grid.appendChild(btn);
    });
    addNode(grid);
    backBtn();
  }, 600);
}

async function loadCalendar(month) {
  const t = addTyping();
  const lm = addMsg('Consultando disponibilidad en tiempo real...', 'bot');
  const { year, num: mon, name } = month;
  const timeMin = new Date(year, mon-1, 1).toISOString();
  const timeMax = new Date(year, mon, 0, 23, 59, 59).toISOString();
  const occupied = new Set();
  try {
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`
      + `?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.items) {
      data.items.forEach(ev => {
        const s = new Date(ev.start.date || ev.start.dateTime);
        const e = new Date(ev.end.date   || ev.end.dateTime);
        for (let d = new Date(s); d < e; d.setDate(d.getDate()+1)) {
          if (d.getMonth()+1 === mon && d.getFullYear() === year) occupied.add(d.getDate());
        }
      });
    }
  } catch(err) { console.warn('Calendar error:', err); }
  t.remove(); lm.remove();
  const daysInMonth = new Date(year, mon, 0).getDate();
  const firstDay    = new Date(year, mon-1, 1).getDay();
  const today       = new Date();
  const wrap = document.createElement('div');
  wrap.className = 'calendar-wrap';
  wrap.innerHTML = `<div class="cal-header">${name} ${year}</div>`;
  const grid = document.createElement('div');
  grid.className = 'cal-grid';
  ['D','L','M','X','J','V','S'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-name'; h.textContent = d; grid.appendChild(h);
  });
  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div'); e.className = 'cal-day empty'; grid.appendChild(e);
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const d = document.createElement('div');
    const date = new Date(year, mon-1, day);
    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    d.className = 'cal-day ' + (isPast ? 'past' : occupied.has(day) ? 'occupied' : 'available');
    if (today.getDate()===day && today.getMonth()+1===mon && today.getFullYear()===year) d.style.outline = '2px solid #1a6e45';
    d.textContent = day;
    grid.appendChild(d);
  }
  wrap.appendChild(grid);
  wrap.innerHTML += `<div class="legend"><span><span class="dot a"></span> Disponible</span><span><span class="dot o"></span> Ocupado</span></div>`;
  addNode(wrap);
  addNode(waLink('¡Quiero reservar esta fecha!', `Hola, quiero reservar en ${name} en la Quinta Las Palmas 🌴`));
  backBtn();
}

function showUbicacion() {
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    addMsg('📍 Nos ubicamos en Av. Gladiolas, entre Noche Buena y Pirul, detrás del cuartel militar.', 'bot');
    const maps = document.createElement('a');
    maps.className = 'maps-btn';
    maps.href = MAPS_LINK; maps.target = '_blank';
    maps.innerHTML = '🗺️ Ver en Google Maps';
    addNode(maps);
    addNode(waLink('Pedir ubicación exacta por WhatsApp', 'Hola, ¿me pueden enviar la ubicación exacta de la Quinta Las Palmas? 📍'));
    backBtn();
  }, 700);
}

function showIncluye() {
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    const card = document.createElement('div');
    card.className = 'info-card';
    card.innerHTML = `
      <div class="info-row">🏊 <span>Alberca + jacuzzi</span></div>
      <div class="info-row">🔥 <span>Asador y disco</span></div>
      <div class="info-row">📶 <span>WiFi gratis</span></div>
      <div class="info-row">🪑 <span>Mesas y sillas</span></div>
      <div class="info-row">🌿 <span>Jardín con palmeras</span></div>
      <div class="info-row">💡 <span>Iluminación con luces colgantes</span></div>
      <div class="info-row">🌀 <span>Ventiladores de techo</span></div>
      <div class="info-row">⏰ <span>6 horas de uso</span></div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;font-size:14px;">
        💰 <strong>$2,100</strong> la renta · Reserva con solo <strong>$500</strong>
      </div>
    `;
    addNode(card);
    addNode(waLink('Quiero reservar', 'Hola, quiero reservar la Quinta Las Palmas 🌴'));
    backBtn();
  }, 700);
}

function showFotos() {
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    addMsg('📸 Aquí te compartimos algunas fotos de la quinta. ¡Toca cualquiera para verla más grande!', 'bot');
    const grid = document.createElement('div');
    grid.className = 'photo-grid';
    PHOTOS.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      const img = document.createElement('img');
      img.src = src; img.alt = 'Foto ' + (i+1); img.loading = 'lazy';
      img.onerror = () => { item.style.display = 'none'; };
      item.appendChild(img);
      item.onclick = () => openLightbox(src);
      grid.appendChild(item);
    });
    addNode(grid);
    addNode(waLink('Me interesa, quiero reservar', 'Hola, vi las fotos y me interesa la Quinta Las Palmas 🌴'));
    backBtn();
  }, 600);
}

function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

showMenu();
</script>
</body>
</html>
